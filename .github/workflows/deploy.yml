name: Deploy Web App

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Login en GitHub Container Registry
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Usamos ASIGNACIÓN DIRECTA en minúsculas usando funciones de GitHub
      - name: Construir y Publicar Imagen Docker
        run: |
          # Convertimos a minúsculas usando Bash de forma segura
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${REPO_LOWER}:latest"
          
          echo "Construyendo imagen: $IMAGE_NAME"
          docker build -t $IMAGE_NAME .
          
          echo "Publicando imagen..."
          docker push $IMAGE_NAME

      - name: Transferir stack.yml al VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "stack.yml"
          target: "/home/${{ secrets.VPS_USER }}/nueva-app"

      - name: Desplegar en Docker Swarm vía SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          command_timeout: 10m
          script: |
            cd /home/${{ secrets.VPS_USER }}/nueva-app
            
            echo "==> Autenticando Docker en el VPS..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "==> Descargando última versión de la imagen..."
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            docker pull ghcr.io/${REPO_LOWER}:latest
            
            echo "==> Lanzando el servicio en la web..."
            docker stack deploy -c stack.yml nueva_web_app
            
            echo "==> Estado actual del despliegue:"
            docker service ls