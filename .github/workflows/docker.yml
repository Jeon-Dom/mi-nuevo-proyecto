name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Descargar Código
        uses: actions/checkout@v4

      - name: 🔐 Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }} 

      - name: 🏗️ Construir y Publicar la imagen de Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/jeon-dom/docker-password-gen:1.0.0
        
      - name: 📤 Pasar stack.yml al servidor (landinga)
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "stack.yml"
          target: "/home/1756024970/landinga"
    
      - name: 🚀 Despliegue del servicio en Docker Swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "✅ Conexión SSH exitosa con el usuario cédula"        
            cd /home/1756024970/landinga

            echo "==> Autenticando Docker con GHCR usando GHCR_TOKEN..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "==> Descargando última versión de la imagen..."
            docker pull ghcr.io/jeon-dom/docker-password-gen:1.0.0

            echo "==> Desplegando stack password..."
            docker stack deploy -c stack.yml password
            
            echo "==> Verificando estado del servicio..."
            docker service ls | grep password   